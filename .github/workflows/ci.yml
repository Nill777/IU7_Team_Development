name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop, 'feature/**' ]
  pull_request:
    types: [ opened, synchronize, reopened, labeled ]
    branches: [ master, develop ]

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
        working-directory: ./src
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Detekt
        run: ./gradlew detekt

  unit-tests:
    name: Unit Tests
    needs: static-analysis
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
        working-directory: ./src
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew :keystroke-sdk:testDebugUnitTest --continue

  integration-tests:
    name: Integration Tests
    needs: unit-tests
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
        working-directory: ./src
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Integration Tests
        run: ./gradlew :app:testDebugUnitTest --tests "*IntegrationTest"

  e2e-tests:
    name: E2E Tests
    needs: integration-tests
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - name: Run E2E Tests
        run: echo "Stub"

  llm-review:
    name: AI Code Review
    needs: e2e-tests
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-llm')
    runs-on: self-hosted
    timeout-minutes: 240
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect entire codebase
        run: |
          python collect_code.py .

      - name: Generate PR diff
        run: |
          git diff origin/develop...HEAD > pr_diff.txt

      - name: Collect context
        run: |
          echo "=== ПРАВИЛА НАПИСАНИЯ КОДА ===" > full_context.txt
          cat docs/code_style_guide.md >> full_context.txt
          
          echo -e "\n\n=== ТЕХНИЧЕСКОЕ ЗАДАНИЕ ===\n" >> full_context.txt
          cat README.md >> full_context.txt
          
          echo -e "\n\n=== ТЕКУЩАЯ КОДОВАЯ БАЗА ПРОЕКТА ===\n" >> full_context.txt
          cat all_project_code.txt >> full_context.txt
          
          echo -e "\n\n=== ИЗМЕНЕНИЯ В ТЕКУЩЕМ PULL REQUEST (DIFF, КОТОРЫЙ НУЖНО ПРОВЕРИТЬ) ===\n" >> full_context.txt
          cat pr_diff.txt >> full_context.txt

      - name: Generate payload
        run: |
          jq -n \
            --rawfile system_msg .github/prompts/reviewer_prompt.md \
            --rawfile user_msg full_context.txt \
            '{
              model: "gemma4:e4b",
              messages:[
                {
                  role: "system", 
                  content: ("<|think|>\n" + $system_msg)
                },
                {
                  role: "user", 
                  content: $user_msg
                }
              ],
              stream: false,
              options: {
                num_ctx: 262144,
                temperature: 1,
                top_p: 0.95,
                top_k: 64
              }
            }' > payload.json

      - name: LLM Call
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --max-time 14400 -s -X POST http://localhost:11434/api/chat \
               -H "Content-Type: application/json" \
               -d @payload.json \
               | jq -r '.message.content' \
               | sed 's/<\|channel>thought.*<channel\|>//g' > ai_report.md

          echo "## AI Code Review" > review_result.md
          cat ai_report.md >> review_result.md

          gh pr comment ${{ github.event.pull_request.number }} -F review_result.md

